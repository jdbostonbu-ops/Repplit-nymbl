kind = "web"
previewPath = "/nymbl/"
title = "Nymbl — Automate Your Marketing"
version = "1.0.0"
id = "artifacts/nymbl"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/nymbl/" ]
localPort = 25707

[services.development]
run = "pnpm --filter @workspace/nymbl run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nymbl", "run", "build" ]
publicDir = "artifacts/nymbl/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25707"
BASE_PATH = "/nymbl/"
