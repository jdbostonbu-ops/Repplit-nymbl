    <linearGradient id="wordmark" x1="304" y1="82" x2="782" y2="196" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.45" stop-color="#DDFBFF"/>
      <stop offset="0.75" stop-color="#00E5FF"/>
      <stop offset="1" stop-color="#FF2FA3"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(140 140) rotate(90) scale(124)">
