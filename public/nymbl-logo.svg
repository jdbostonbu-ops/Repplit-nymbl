<svg width="960" height="280" viewBox="0 0 960 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Nymbl logo</title>
  <desc id="desc">Electric media-style Nymbl wordmark with an automation spark emblem.</desc>
  <defs>
    <linearGradient id="spectrum" x1="94" y1="42" x2="236" y2="232" gradientUnits="userSpaceOnUse">
